name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      id-token: write
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is on master
        env:
          TAG_SHA: ${{ github.sha }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/master; then
            echo "::error::Tag $TAG_NAME ($TAG_SHA) is not an ancestor of origin/master. Refusing to release from an off-master commit."
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install

      - name: GitHub release
        run: pnpm conventional-github-releaser -p vuetify
        env:
          CONVENTIONAL_GITHUB_RELEASER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: pnpm build

      # Ensure npm 11.5.1 or later is installed
      - name: Update NPM
        run: npm install -g npm@latest

      - name: Publish to NPM
        run: pnpm -r publish --access public --no-git-checks