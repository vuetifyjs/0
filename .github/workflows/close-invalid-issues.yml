name: Close invalid issues

# Issues must be created through the issue generator (https://issues.vuetifyjs.com),
# which stamps a hidden marker comment into the body. Anything opened without the
# marker is commented on, labeled invalid, and closed as not planned — the same
# policy vuetifyjs/vuetify declares in .github/issue-close-app.yml, enforced here
# natively because the probot app that read that config is defunct (no activity
# since 2022). Org members/collaborators are exempt, and including
# `<!-- override-close -->` in the body bypasses the gate.

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    if: >-
      github.repository_owner == 'vuetifyjs' &&
      !contains(github.event.issue.body, '<!-- generated by vuetify-issue-helper. DO NOT REMOVE -->') &&
      !contains(github.event.issue.body, '<!-- override-close -->') &&
      !contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.issue.author_association) &&
      !contains(fromJSON('["johnleider", "J-Sek"]'), github.event.issue.user.login)
    steps:
      - name: Comment, label, and close
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
          COMMENT: >-
            Please only create issues with the provided
            [issue creator](https://issues.vuetifyjs.com/?repo=vuetify0).
            Issues opened without it are closed automatically.
            For general questions, please join
            [the Discord chat room](https://community.vuetifyjs.com). Thank you.
        run: |
          gh issue comment "$NUMBER" --repo "$REPO" --body "$COMMENT"
          gh issue edit "$NUMBER" --repo "$REPO" --add-label invalid
          gh issue close "$NUMBER" --repo "$REPO" --reason 'not planned'
