name: Docs Deploy
on:
  push:
    branches: [master]
    # Single paths list with `!` negations — GitHub does not allow both
    # `paths` and `paths-ignore` on the same event. Order matters: a negation
    # after a positive match wins, so a test-only src commit is excluded.
    paths:
      - 'apps/docs/**'
      - 'packages/0/src/**'
      - 'packages/0/package.json'
      - 'packages/genesis/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/docs-deploy.yml'
      - '!packages/0/src/**/*.test.ts'
      - '!packages/0/src/**/*.bench.ts'
      - '!packages/0/src/**/*.browser.test.ts'
      - '!packages/0/src/**/*.ssr.test.ts'

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
      packages: write
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: vuetifyjs/setup-action@cb5ac088588387e65433a762de90c0b06d878677 # master
      - name: Restore OG images cache
        uses: actions/cache@v4
        with:
          path: apps/docs/node_modules/.cache/og-images
          key: og-images-${{ hashFiles('apps/docs/build/og-images-worker.ts', 'apps/docs/build/generate-og-images.ts', 'apps/docs/build/fonts/**') }}
          restore-keys: |
            og-images-
      - name: Restore API metadata cache
        uses: actions/cache@v4
        with:
          path: apps/docs/node_modules/.cache/api-cache.json
          key: api-cache-${{ hashFiles('packages/0/src/components/**', 'packages/0/src/composables/**', 'apps/docs/build/generate-api.ts') }}
      - run: pnpm run build:docs
        env:
          VITE_API_SERVER_URL: ${{ vars.API_SERVER_URL }}
          VITE_GITHUB_SHA: ${{ github.sha }}
      - uses: vuetifyjs/coolify-action@37a9c5a532f4c489e941d43edffd73fd2af00ec2 # master
        with:
          imageName: v0-docs
          dockerfilePath: ./apps/docs/Dockerfile
          token: ${{ secrets.GITHUB_TOKEN  }}
          coolifyWebhook: ${{ secrets.COOLIFY_WEBHOOK }}
          coolifySecret: ${{ secrets.COOLIFY_TOKEN }}
