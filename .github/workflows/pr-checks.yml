name: PR Checks

on:
  pull_request:
    branches: [master, dev, next]
  push:
    branches: [master, dev, next]

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

  lint:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run linter
        run: pnpm lint

  typecheck:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run type checking
        run: pnpm typecheck

  test:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      # Coverage is scoped to .ts (composables/utilities/plugins); component
      # .vue coverage comes from the browser job below and Codecov merges the
      # two flagged uploads into one project total.
      - name: Run unit tests with coverage
        run: pnpm test:run --coverage --project '!v0:browser' --coverage.include='packages/0/src/**/*.ts'
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          disable_search: true
          flags: unit
          name: unit
          slug: vuetifyjs/0
          fail_ci_if_error: true
          verbose: true

  # Component tests run in a real browser (Playwright/Chromium) and are kept in
  # their own job so a render/timing flake can't red the unit + coverage signal.
  # The Chromium binary is cached on ~/.cache/ms-playwright keyed by the pinned
  # playwright version; only the apt system deps are (re)installed each run.
  browser:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # TODO: bump the version in this key whenever the `playwright` catalog
          # pin changes in pnpm-workspace.yaml, or the cache serves a stale binary.
          key: playwright-chromium-1.61.0-${{ runner.os }}
      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium
      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium
      # Coverage scoped to component .vue; composable .ts coverage comes from the
      # unit job. Uploaded under the `browser` flag so Codecov merges the two.
      - name: Run component tests with coverage
        run: pnpm exec vitest run --project v0:browser --coverage --coverage.include='packages/0/src/components/**/*.vue'
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          disable_search: true
          flags: browser
          name: browser
          slug: vuetifyjs/0
          fail_ci_if_error: true
          verbose: true

  # Upload success ≠ processed report. Codecov queues OK then sometimes leaves
  # commit state/totals null (badge graph → "unknown"). Surface that here so we
  # don't ship a green CI over a dark coverage signal. Non-blocking: processing
  # can lag; the annotation is the loud signal until reports complete again.
  codecov-health:
    needs: [test, browser]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Poll Codecov commit report
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          url="https://api.codecov.io/api/v2/github/vuetifyjs/repos/0/commits/${SHA}"
          echo "Polling $url"
          state=""
          coverage=""
          for attempt in 1 2 3 4 5 6; do
            body=$(curl -fsS "$url" || true)
            state=$(printf '%s' "$body" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("state") or "")' 2>/dev/null || true)
            coverage=$(printf '%s' "$body" | python3 -c 'import sys,json; d=json.load(sys.stdin); t=d.get("totals") or {}; print(t.get("coverage") if isinstance(t, dict) else "")' 2>/dev/null || true)
            echo "attempt=$attempt state=${state:-null} coverage=${coverage:-null}"
            if [ -n "$state" ] && [ "$state" != "null" ] && [ -n "$coverage" ]; then
              echo "Codecov report complete: state=$state coverage=$coverage"
              exit 0
            fi
            sleep 20
          done
          echo "::warning::Codecov upload queued but commit ${SHA} still has state/totals null after ~2m. Repo totals badge may be stale; check https://app.codecov.io/github/vuetifyjs/0/commit/${SHA}"
          exit 0

  repo-integrity:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need base...HEAD for metrics artifact guard
      - uses: ./.github/actions/setup
      - name: Run knip check
        run: pnpm repo:knip
      - name: Run sherif check
        run: pnpm repo:sherif
      - name: Guard benchmark artifacts
        if: github.event_name == 'pull_request'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$GITHUB_BASE_REF" --depth=1
          pnpm metrics:check

  # Vapor parity tests run on a beta Vue (tests/vapor, vue@3.6.0-beta), pinned
  # separately from the rest of the repo. Non-blocking: a Vapor regression
  # surfaces as a visible signal without redding the build on a beta hiccup.
  vapor:
    needs: prepare
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run Vapor-mode tests
        run: pnpm test:vapor

  build:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build packages
        run: pnpm build
      - name: Validate package exports (publint + are-the-types-wrong)
        run: pnpm repo:exports

  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      packages: ${{ steps.filter.outputs.packages }}
      playground: ${{ steps.filter.outputs.playground }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - 'apps/docs/**'
              - 'packages/**'
            packages:
              - 'packages/**'
              - '.size-limit.json'
            playground:
              - 'apps/playground/**'
              - 'packages/**'

  docs-check:
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: vuetifyjs/setup-action@cb5ac088588387e65433a762de90c0b06d878677 # master
      - run: pnpm run build:docs
        env:
          VITE_API_SERVER_URL: ${{ vars.API_SERVER_URL }}
          SKIP_OG_IMAGES: '1'
      - name: Link Checker (internal only)
        uses: lycheeverse/lychee-action@v2
        with:
          lycheeVersion: v0.22.0
          # --offline skips all remote URLs; the remap folds https://0.vuetifyjs.com
          # self-links (canonical/og tags) onto the local dist so they are validated
          # as files. External link health runs weekly in link-check.yml instead.
          args: >-
            --config lychee.toml
            --offline
            --remap 'https://0\.vuetifyjs\.com(.*) file://${{ github.workspace }}/apps/docs/dist$1'
            './apps/docs/dist'
          fail: true

  playground-check:
    needs: changes
    if: ${{ needs.changes.outputs.playground == 'true' && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: vuetifyjs/setup-action@cb5ac088588387e65433a762de90c0b06d878677 # master
      - run: pnpm run build:play

  size:
    needs: [changes]
    if: ${{ needs.changes.outputs.packages == 'true' && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build packages
        run: pnpm build
      - name: Check bundle sizes
        run: pnpm size
