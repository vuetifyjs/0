name: PR Checks

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

  lint:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run linter
        run: pnpm lint

  typecheck:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run type checking
        run: pnpm typecheck

  test:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      # Coverage is scoped to .ts (composables/utilities/plugins); component
      # .vue coverage comes from the browser job below and Codecov merges the
      # two flagged uploads into one project total.
      - name: Run unit tests with coverage
        run: pnpm test:run --coverage --project '!v0:browser' --coverage.include='packages/0/src/**/*.ts'
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unit
          fail_ci_if_error: false

  # Component tests run in a real browser (Playwright/Chromium) and are kept in
  # their own job so a render/timing flake can't red the unit + coverage signal.
  # The Chromium binary is cached on ~/.cache/ms-playwright keyed by the pinned
  # playwright version; only the apt system deps are (re)installed each run.
  browser:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # TODO: bump the version in this key whenever the `playwright` catalog
          # pin changes in pnpm-workspace.yaml, or the cache serves a stale binary.
          key: playwright-chromium-1.61.0-${{ runner.os }}
      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium
      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium
      # Coverage scoped to component .vue; composable .ts coverage comes from the
      # unit job. Uploaded under the `browser` flag so Codecov merges the two.
      - name: Run component tests with coverage
        run: pnpm exec vitest run --project v0:browser --coverage --coverage.include='packages/0/src/components/**/*.vue'
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: browser
          fail_ci_if_error: false

  repo-integrity:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run knip check
        run: pnpm repo:knip
      - name: Run sherif check
        run: pnpm repo:sherif

  # Vapor parity tests run on a beta Vue (tests/vapor, vue@3.6.0-beta), pinned
  # separately from the rest of the repo. Non-blocking: a Vapor regression
  # surfaces as a visible signal without redding the build on a beta hiccup.
  vapor:
    needs: prepare
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run Vapor-mode tests
        run: pnpm test:vapor

  build:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build packages
        run: pnpm build
      - name: Validate package exports (publint + are-the-types-wrong)
        run: pnpm repo:exports

  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      playground: ${{ steps.filter.outputs.playground }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - 'apps/docs/**'
              - 'packages/**'
            playground:
              - 'apps/playground/**'
              - 'packages/**'

  docs-check:
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: vuetifyjs/setup-action@cb5ac088588387e65433a762de90c0b06d878677 # master
      - run: pnpm run build:docs
        env:
          VITE_API_SERVER_URL: ${{ vars.API_SERVER_URL }}
          SKIP_OG_IMAGES: '1'
      - name: Link Checker (internal only)
        uses: lycheeverse/lychee-action@v2
        with:
          lycheeVersion: v0.22.0
          # --offline skips all remote URLs; the remap folds https://0.vuetifyjs.com
          # self-links (canonical/og tags) onto the local dist so they are validated
          # as files. External link health runs weekly in link-check.yml instead.
          args: >-
            --config lychee.toml
            --offline
            --remap 'https://0\.vuetifyjs\.com(.*) file://${{ github.workspace }}/apps/docs/dist$1'
            './apps/docs/dist'
          fail: true

  playground-check:
    needs: changes
    if: ${{ needs.changes.outputs.playground == 'true' && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: vuetifyjs/setup-action@cb5ac088588387e65433a762de90c0b06d878677 # master
      - run: pnpm run build:play
