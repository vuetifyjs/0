name: Playground Deploy
on:
  push:
    branches: [master]
    # Single paths list with `!` negations — GitHub does not allow both
    # `paths` and `paths-ignore` on the same event. Playground bundles only
    # @vuetify/v0 (no genesis, no paper), so those packages are omitted.
    paths:
      - 'apps/playground/**'
      - 'packages/0/src/**'
      - 'packages/0/package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/playground-deploy.yml'
      - '!packages/0/src/**/*.test.ts'
      - '!packages/0/src/**/*.bench.ts'
      - '!packages/0/src/**/*.browser.test.ts'
      - '!packages/0/src/**/*.ssr.test.ts'

concurrency:
  group: playground-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
      packages: write
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: vuetifyjs/setup-action@cb5ac088588387e65433a762de90c0b06d878677 # master
      - run: pnpm run build:play
      - uses: vuetifyjs/coolify-action@37a9c5a532f4c489e941d43edffd73fd2af00ec2 # master
        with:
          imageName: v0-playground
          dockerfilePath: ./apps/playground/Dockerfile
          token: ${{ secrets.GITHUB_TOKEN  }}
          coolifyWebhook: ${{ secrets.COOLIFY_PLAYGROUND_WEBHOOK }}
          coolifySecret: ${{ secrets.COOLIFY_TOKEN }}
